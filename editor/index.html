<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compise Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1e1e2e;
      --surface:  #252538;
      --border:   #313149;
      --accent:   #7c6af7;
      --accent2:  #5ba3f5;
      --text:     #cdd6f4;
      --muted:    #6c7086;
      --ok:       #a6e3a1;
      --err:      #f38ba8;
      --warn:     #f9e2af;
      --toolbar:  48px;
      font: 14px/1.4 system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */

    #toolbar {
      height: var(--toolbar);
      min-height: var(--toolbar);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
      margin-right: auto;
    }

    #toolbar button {
      height: 30px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s;
    }

    #toolbar button:hover:not(:disabled)  { background: var(--border); }
    #toolbar button:disabled              { opacity: 0.45; cursor: default; }
    #btn-run  { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    #btn-run:hover:not(:disabled)         { background: #6a58e0; border-color: #6a58e0; }

    /* ── Status bar ───────────────────────────────────────────────────────── */

    #statusbar {
      height: 24px;
      min-height: 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 0 14px;
      display: flex;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    #status.ok  { color: var(--ok); }
    #status.err { color: var(--err); }

    /* ── Main panels ─────────────────────────────────────────────────────── */

    #main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    #editor-wrap {
      border-right: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #panel-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 6px 14px 4px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #editor {
      flex: 1;
      overflow: hidden;
    }

    /* Force CodeMirror to fill the container */
    #editor .cm-editor { height: 100%; }
    #editor .cm-scroller { overflow: auto !important; }

    #output-wrap {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #output-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 6px 14px 4px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .out-line { white-space: pre-wrap; word-break: break-all; }
    .out-log  { color: var(--text); }
    .out-error { color: var(--err); }
    .out-warn  { color: var(--warn); }
    .out-wat   { color: var(--muted); font-size: 12px; }

    /* ── Scrollbar styling ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Compise</h1>
  <button id="btn-run">&#9654; Run</button>
  <button id="btn-wat">WAT</button>
</div>

<div id="main">
  <div id="editor-wrap">
    <div id="panel-label">Source</div>
    <div id="editor"></div>
  </div>

  <div id="output-wrap">
    <div id="output-label">Output</div>
    <div id="output"></div>
  </div>
</div>

<div id="statusbar">
  <span id="status">Ready — press Run to compile and execute</span>
</div>

<!--
  Import map: CodeMirror 6 packages loaded from CDN.
  The Compise compiler (dist/compise.esm.js) is loaded from the local build.
-->
<script type="importmap">
{
  "imports": {
    "codemirror":               "https://esm.sh/codemirror@6.0.1",
    "@codemirror/state":        "https://esm.sh/@codemirror/state@6.4.1",
    "@codemirror/view":         "https://esm.sh/@codemirror/view@6.31.1",
    "@codemirror/commands":     "https://esm.sh/@codemirror/commands@6.6.2",
    "@codemirror/language":     "https://esm.sh/@codemirror/language@6.10.3",
    "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.2",
    "@codemirror/theme-one-dark":  "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.3",
    "@codemirror/lint":         "https://esm.sh/@codemirror/lint@6.8.2",
    "@codemirror/search":       "https://esm.sh/@codemirror/search@6.5.7",
    "@lezer/common":            "https://esm.sh/@lezer/common@1.2.3",
    "@lezer/highlight":         "https://esm.sh/@lezer/highlight@1.2.1",
    "@lezer/javascript":        "https://esm.sh/@lezer/javascript@1.4.21",
    "style-mod":                "https://esm.sh/style-mod@4.1.2",
    "w3c-keyname":              "https://esm.sh/w3c-keyname@2.2.8",
    "crelt":                    "https://esm.sh/crelt@1.0.6"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
